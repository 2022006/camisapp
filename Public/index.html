<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Camisa Gen 2027</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="barra-login">
    <div class="login-container">
        <input type="text" id="nombreUsuario" placeholder="Nombre de usuario">

<input type="email" id="emailLogin" placeholder="Correo">

<input type="password" id="claveLogin" placeholder="Contraseña">

<button id="btnRegistro">Registrarse</button>

<button id="btnLogin">Iniciar sesión</button>
    </div>
</header>

  <header class="hero">
    <div>
      <span class="badge">EXPOTEC · GEN 2027</span>
      <h1>Diseñador de Camisa Gen 2027</h1>
      <p>Crea, guarda, edita y vota por la línea gráfica de la próxima camisa.</p>
    </div>
  </header>

  <main class="contenedor">

    <section class="panel card">
      <div class="section-title">
        <h2>Diseña tu camiseta</h2>
        <p>Selecciona una parte de la camisa y cambia su color.</p>
      </div>

      <div class="formulario">
        <input type="hidden" id="camisetaId">

        <label for="nombreDiseno">Nombre del diseño</label>
        <input type="text" id="nombreDiseno" placeholder="Ej: Earthy Gen 2027">

        <label for="autor">Autor</label>
        <input type="text" id="autor" placeholder="Ej: Marcelo">

        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" placeholder="Ej: Diseño inspirado en una paleta elegante y natural."></textarea>

        <label for="colorPicker">Color seleccionado</label>
        <input type="color" id="colorPicker" value="#ffffff">

        <p id="parteActual">Selecciona una parte de la camisa</p>

        <button id="btnGuardar">Guardar diseño</button>
        <button id="btnActualizar" class="btn-edit oculto">Actualizar diseño</button>
        <button id="btnCancelar" class="btn-cancel oculto">Cancelar edición</button>
        <button id="btnLimpiar" class="btn-secondary">Reiniciar colores</button>
      </div>
    </section>

    <section class="camiseta-preview card">

      <svg id="camisetaSvg" viewBox="0 0 300 360">

        <defs>
          <filter id="sombra">
            <feDropShadow dx="0" dy="5" stdDeviation="5"/>
          </filter>
        </defs>

        <g filter="url(#sombra)">

          <!-- Manga Izquierda -->
          <path
            id="mangaIzquierda"
            class="parte-camiseta"
            d="M95 80 L30 120 L60 180 L110 150 Z"
            fill="#ffffff"
            stroke="#111827"
            stroke-width="3"
          />

          <!-- Manga Derecha -->
          <path
            id="mangaDerecha"
            class="parte-camiseta"
            d="M205 80 L270 120 L240 180 L190 150 Z"
            fill="#ffffff"
            stroke="#111827"
            stroke-width="3"
          />

          <!-- Torso -->
          <path
            id="torso"
            class="parte-camiseta"
            d="
              M95 80
              Q150 120 205 80
              L220 320
              L80 320
              Z
            "
            fill="#ffffff"
            stroke="#111827"
            stroke-width="3"
          />

          <!-- Panel lateral izquierdo -->
          <path
            d="
              M105 125
              L120 125
              L130 305
              L118 305
              Z
            "
            fill="#d1d5db"
            pointer-events="none"
          />

          <!-- Panel lateral derecho -->
          <path
            d="
              M195 125
              L180 125
              L170 305
              L182 305
              Z
            "
            fill="#d1d5db"
            pointer-events="none"
          />

          <!-- Cuello V -->
          <path
            id="cuello"
            class="parte-camiseta"
            d="
              M120 78
              L150 108
              L180 78
              L170 78
              L150 95
              L130 78
              Z
            "
            fill="#ffffff"
            stroke="#111827"
            stroke-width="3"
          />

          <!-- Costuras -->
          <line
            x1="95"
            y1="80"
            x2="80"
            y2="320"
            stroke="#374151"
            stroke-width="1"
            opacity="0.4"
            pointer-events="none"
          />

          <line
            x1="205"
            y1="80"
            x2="220"
            y2="320"
            stroke="#374151"
            stroke-width="1"
            opacity="0.4"
            pointer-events="none"
          />

          <!-- Franja decorativa pecho -->
          <rect
            x="105"
            y="120"
            width="90"
            height="8"
            rx="4"
            fill="#d1d5db"
            pointer-events="none"
          />

          <!-- Texto principal -->
          <text
            x="150"
            y="205"
            text-anchor="middle"
            font-size="24"
            fill="#111827"
            font-weight="bold">
            GEN 2027
          </text>

          <!-- Texto pequeño -->
          <text
            x="150"
            y="225"
            text-anchor="middle"
            font-size="10"
            fill="#6b7280"
            pointer-events="none">
          </text>

        </g>

      </svg>

    </section>

    <section class="lista-disenos card">
      <div class="section-title">
        <h2>Diseños guardados</h2>
        <p>Administra los diseños registrados en MongoDB.</p>
      </div>

      <div id="contenedorCamisetas"></div>
    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
